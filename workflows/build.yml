name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend ^
            --add-data "platforms;platforms" ^
            --add-data "core;core" ^
            --add-data "api;api" ^
            --add-data "services;services" ^
            --add-data "static;static" ^
            main.py

      - name: Prepare Electron build
        run: |
          mkdir electron\backend
          copy dist\backend.exe electron\backend\

      - name: Build Electron app
        run: |
          cd electron
          npm ci
          npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: any-auto-register-win
          path: electron/dist/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.exe
          generate_release_notes: true
